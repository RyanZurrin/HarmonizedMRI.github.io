---
layout: default
---

<!-- Define 3-column grid for displaying projects -->
<style>
  .container {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-auto-flow: row;
    grid-gap: 50px;
  }
</style>

<article class="post">
  {%- if page.title -%}
  <h1 class="page-heading">{{ page.title }}</h1>
  {%- endif -%}

  <div class="post-content">{{ content }}</div>
</article>
